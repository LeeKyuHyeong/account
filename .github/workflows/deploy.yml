# account-app CD — main push 시 VPS(account.kyuhyeong.com)에 account-api 자동 배포.
#
# 동작:
#   1. main push (또는 Actions 탭에서 수동 dispatch) 트리거
#   2. production 환경 승인 게이트에서 일시정지 → 1-click 승인 → 진행
#      ⚠ 게이트가 실제로 작동하려면 GitHub → Settings → Environments → production 에
#        Required reviewer(본인)를 등록해야 한다. 미설정 시 승인 없이 즉시 배포된다.
#   3. SSH 로 VPS(root) 접속 → git pull → docker compose build/up account-api
#
# 필요한 GitHub Secrets / Variables (Settings → Secrets and variables → Actions):
#   Secrets:   DEPLOY_SSH_PRIVATE_KEY, DEPLOY_SSH_HOST
#   Variables: DEPLOY_SSH_USER(=root), DEPLOY_SSH_PORT(=22), DEPLOY_PATH(=/root/account-app)
#
# CI(ci.yml)와 독립 트리거다 — 배포 전 CI 초록 여부는 승인 단계에서 눈으로 확인한다.

name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 트리거도 허용

# 배포는 한 번에 하나만. 진행 중이면 취소하지 않고 대기시킨다(배포 중간 중단 방지).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy account-api to VPS
    runs-on: ubuntu-latest
    environment: production   # ← Required reviewer 승인 대기 (설정돼 있을 때)
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ vars.DEPLOY_SSH_USER }}
          port:     ${{ vars.DEPLOY_SSH_PORT }}
          key:      ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            git fetch --prune
            git checkout main
            git pull --ff-only
            docker compose -f docker-compose.prod.yml --env-file .env.prod build account-api
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d account-api
            docker image prune -f
