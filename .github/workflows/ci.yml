# account-app CI — backend (Gradle build + test).
#
# 트리거: push to main / develop, 모든 PR.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 같은 브랜치 push 가 연달아 오면 이전 잡 취소 — 무의미한 큐 적체 방지.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Gradle build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + test
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7
