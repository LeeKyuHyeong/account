<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('가구 설정', ~{::content})}">
  <th:block th:fragment="content">

    <div class="mb-3">
      <h1 class="toss-page-title">가구 설정</h1>
      <p class="toss-page-subtitle">가구 멤버 · 초대코드</p>
    </div>

    <!-- flash 메시지(발급된 초대코드 포함)는 fragments/layout.html 공통 영역이 처리 -->

    <!-- ─── 초대코드 ─── -->
    <div class="toss-card mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="fw-semibold" style="color: var(--toss-text-strong);">초대코드</div>
        <form th:action="@{/web/admin/invite}" method="post" class="d-inline">
          <button class="btn toss-pill toss-pill--primary" type="submit">새 코드 발급</button>
        </form>
      </div>
      <p style="font-size: 12px; color: var(--toss-text-muted);" class="mb-2">
        새 멤버가 "초대코드 입력하기" 에서 이 코드를 입력하면 우리 가구에 합류해요. (코드를 탭하면 복사돼요)
      </p>
      <div th:if="${#lists.isEmpty(inviteCodes)}"
           style="font-size: 13px; color: var(--toss-text-muted);">
        아직 발급된 코드가 없어요.
      </div>
      <ul class="list-unstyled mb-0" th:unless="${#lists.isEmpty(inviteCodes)}">
        <li th:each="ic : ${inviteCodes}" class="d-flex justify-content-between align-items-center py-1">
          <code class="invite-code" role="button" tabindex="0" title="탭하여 복사"
                style="font-size: 16px; letter-spacing: 0.08em; cursor: pointer;"
                th:attr="data-code=${ic.code}" th:text="${ic.code}">ABCD2345</code>
          <span style="font-size: 12px; color: var(--toss-text-muted);"
                th:text="${#temporals.format(ic.createdAt, 'yyyy-MM-dd')}">2026-06-02</span>
        </li>
      </ul>
    </div>

    <!-- ─── 멤버 ─── -->
    <div th:each="m : ${members}" class="toss-card mb-2">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div style="font-weight: 700; color: var(--toss-text-strong); letter-spacing: -0.01em;"
               th:text="${m.name}">홍길동</div>
          <div style="font-size: 12px; color: var(--toss-text-muted);">
            최근 로그인:
            <span th:text="${m.lastLoginAt != null
                  ? #temporals.format(m.lastLoginAt, 'yyyy-MM-dd HH:mm') : '없음'}">없음</span>
          </div>
        </div>
        <span class="toss-badge"
              th:classappend="${m.role == 'OWNER'} ? 'toss-badge--primary' : 'toss-badge--neutral'"
              th:text="${m.role}">OWNER</span>
      </div>
    </div>

    <div class="d-grid gap-2 mt-3">
      <a th:href="@{/web/home}" class="btn toss-cta toss-cta-secondary">홈으로</a>
    </div>

    <!-- 초대코드 탭하여 복사 — Clipboard API(https/localhost). 복사 후 잠깐 "복사됨 ✓" 표시. -->
    <script th:inline="none">
      document.querySelectorAll('.invite-code').forEach(function (el) {
        function showCopied() {
          var orig = el.getAttribute('data-code');
          el.textContent = '복사됨 ✓';
          setTimeout(function () { el.textContent = orig; }, 1200);
        }
        el.addEventListener('click', function () {
          var code = el.getAttribute('data-code');
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(code).then(showCopied).catch(function () {});
          } else {
            var range = document.createRange();
            range.selectNodeContents(el);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            try { document.execCommand('copy'); showCopied(); } catch (e) {}
          }
        });
      });
    </script>

  </th:block>
</th:block>
</body>
</html>
