<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('관리자', ~{::content})}">
  <th:block th:fragment="content">

    <div class="mb-3">
      <h1 class="toss-page-title">관리자</h1>
      <p class="toss-page-subtitle">가구 멤버 관리 · 비밀번호 재설정</p>
    </div>

    <!-- flash 메시지는 fragments/layout.html 의 공통 영역이 처리 -->

    <div th:each="m : ${members}" class="toss-card mb-2">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <div>
          <div style="font-weight: 700; color: var(--toss-text-strong); letter-spacing: -0.01em;"
               th:text="${m.name}">홍길동</div>
          <div style="font-size: 12px; color: var(--toss-text-muted);" th:text="${m.email}">user@example.com</div>
        </div>
        <span class="toss-badge"
              th:classappend="${m.role == 'OWNER'} ? 'toss-badge--primary' : 'toss-badge--neutral'"
              th:text="${m.role}">OWNER</span>
      </div>
      <div style="font-size: 12px; color: var(--toss-text-muted);" class="mb-2">
        최근 로그인:
        <span th:text="${m.lastLoginAt != null
              ? #temporals.format(m.lastLoginAt, 'yyyy-MM-dd HH:mm') : '없음'}">없음</span>
      </div>
      <form method="post" class="input-group input-group-sm toss-form"
            th:action="@{/web/admin/users/{userId}/password(userId=${m.userId})}">
        <input type="password" name="newPassword" class="form-control" autocomplete="new-password"
               minlength="8" placeholder="새 비밀번호 (8자 이상)" required>
        <button class="btn toss-pill toss-pill--primary" type="submit">변경</button>
      </form>
    </div>

    <div class="d-grid gap-2 mt-3">
      <a th:href="@{/web/home}" class="btn toss-cta toss-cta-secondary">홈으로</a>
    </div>

  </th:block>
</th:block>
</body>
</html>
