<!DOCTYPE html>
<!-- Spring Boot 기본 에러 뷰. chrome 없이 독립 렌더 (미인증 상태에서도 안전). -->
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-bs-theme="light">
<head th:replace="~{fragments/head :: head('오류')}"></head>
<body class="toss-page-bg">
<main class="container" style="max-width: 480px; padding-top: 80px;">

  <h1 class="toss-page-title text-center mb-1" style="font-size: 26px;">문제가 발생했어요</h1>
  <p class="toss-page-subtitle text-center mb-4">
    <span th:text="${status} ?: ''">500</span>
    <span th:text="${error} ?: ''">Error</span>
  </p>

  <div class="toss-card text-center" style="padding: 24px;">
    <p th:if="${message}" th:text="${message}"
       style="font-size: 13px; color: var(--toss-text-muted);" class="mb-4"></p>
    <div class="d-grid gap-2">
      <a th:href="@{/web/home}" class="btn toss-cta toss-cta-primary">홈으로</a>
      <a th:href="@{/login}" class="btn toss-cta toss-cta-secondary">로그인 화면</a>
    </div>
  </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
