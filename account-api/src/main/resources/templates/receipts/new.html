<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{fragments/layout :: page('영수증 업로드', ~{::content})}">
  <th:block th:fragment="content">

    <div class="mb-3">
      <h1 class="toss-page-title">영수증</h1>
      <p class="toss-page-subtitle">사진 한 장으로 거래를 자동 분석합니다</p>
    </div>

    <div th:if="${error}" class="toss-alert toss-alert--danger" th:text="${error}"></div>

    <div th:if="${quotaExceeded}" sec:authorize="hasRole('OWNER')" class="d-grid mb-3">
      <a th:href="@{/web/plan}" class="btn toss-cta toss-cta-primary">플랜 업그레이드</a>
    </div>

    <form method="post" th:action="@{/web/receipts}" enctype="multipart/form-data" class="toss-form">
      <div class="toss-card mb-3">
        <div class="mb-3">
          <label class="form-label">영수증 사진</label>
          <input type="file" name="image" accept="image/*" capture="environment"
                 class="form-control" required>
          <div class="form-text">사진을 찍거나 갤러리에서 선택하세요. 최대 10MB.</div>
        </div>
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn toss-cta toss-cta-primary">업로드 & 분석</button>
        <a th:href="@{/web/transactions}" class="btn toss-cta toss-cta-secondary">취소</a>
      </div>
    </form>

  </th:block>
</th:block>
</body>
</html>
