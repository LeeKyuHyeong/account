<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('영수증 업로드', ~{::content})}">
  <th:block th:fragment="content">

    <h1 class="h5 mb-3">영수증 업로드</h1>

    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <form method="post" th:action="@{/web/receipts}" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">영수증 사진</label>
        <input type="file" name="image" accept="image/*" capture="environment"
               class="form-control" required>
        <div class="form-text">사진을 찍거나 갤러리에서 선택하세요. 최대 10MB.</div>
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">업로드 & 분석</button>
        <a th:href="@{/web/transactions}" class="btn btn-outline-secondary">취소</a>
      </div>
    </form>

  </th:block>
</th:block>
</body>
</html>
