<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:replace="~{fragments/layout :: page('영수증 업로드', ~{::content})}">
  <th:block th:fragment="content">

    <div class="mb-3">
      <h1 class="toss-page-title">영수증</h1>
      <p class="toss-page-subtitle">사진 한 장으로 거래를 자동 분석합니다</p>
    </div>

    <div th:if="${error}" class="toss-alert toss-alert--danger" th:text="${error}"></div>

    <div th:if="${quotaExceeded}" sec:authorize="hasRole('OWNER')" class="d-grid mb-3">
      <a th:href="@{/web/plan}" class="btn toss-cta toss-cta-primary">플랜 업그레이드</a>
    </div>

    <form method="post" th:action="@{/web/receipts}" enctype="multipart/form-data" class="toss-form">
      <div class="toss-card mb-3">
        <div class="mb-3">
          <label class="form-label">영수증 사진</label>
          <!--
            숨긴 input 하나를 두 버튼이 공유 — "사진 찍기" 는 capture=environment 를 켜서
            모바일 카메라를 바로 띄우고, "갤러리에서 선택" 은 capture 를 떼고 파일 선택기를 연다.
            display:none input 의 required 는 브라우저 검증이 막히므로 빼고 서버 검증(validateImage)에 맡긴다.
          -->
          <input type="file" name="image" accept="image/*" class="d-none" id="receipt-image">
          <div class="row g-2">
            <div class="col-6">
              <button type="button" class="btn toss-cta toss-cta-secondary w-100 py-3" id="pick-camera">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                     viewBox="0 0 16 16" aria-hidden="true" class="d-block mx-auto mb-1">
                  <path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4z"/>
                  <path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5m0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7M3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0"/>
                </svg>
                사진 찍기
              </button>
            </div>
            <div class="col-6">
              <button type="button" class="btn toss-cta toss-cta-secondary w-100 py-3" id="pick-gallery">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                     viewBox="0 0 16 16" aria-hidden="true" class="d-block mx-auto mb-1">
                  <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                  <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1z"/>
                </svg>
                갤러리에서 선택
              </button>
            </div>
          </div>
          <div class="form-text" id="receipt-file-hint">사진을 찍거나 갤러리에서 선택하세요. 최대 10MB.</div>
        </div>
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn toss-cta toss-cta-primary">업로드 & 분석</button>
        <a th:href="@{/web/transactions}" class="btn toss-cta toss-cta-secondary">취소</a>
      </div>
    </form>

    <script th:inline="none">
      (function () {
        var input = document.getElementById('receipt-image');
        var hint = document.getElementById('receipt-file-hint');
        function pick(useCamera) {
          if (useCamera) input.setAttribute('capture', 'environment');
          else input.removeAttribute('capture');
          input.click();
        }
        document.getElementById('pick-camera').addEventListener('click', function () { pick(true); });
        document.getElementById('pick-gallery').addEventListener('click', function () { pick(false); });
        input.addEventListener('change', function () {
          hint.textContent = input.files.length
              ? '선택됨: ' + input.files[0].name
              : '사진을 찍거나 갤러리에서 선택하세요. 최대 10MB.';
        });
      })();
    </script>

  </th:block>
</th:block>
</body>
</html>
