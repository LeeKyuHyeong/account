<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('순자산', ~{::content})}">
  <th:block th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="toss-page-title">순자산</h1>
      <form method="get" th:action="@{/web/networth}" class="d-flex">
        <input type="month" name="ym" th:value="${month}" class="form-control form-control-sm"
               onchange="this.form.submit()">
      </form>
    </div>

    <!-- Hero: 순자산 큰 숫자 + 자산/부채 stat -->
    <section class="mb-3">
      <p class="toss-period">총 순자산</p>
      <p class="toss-amount"
         th:classappend="${snapshot.netWorth.signum() < 0} ? 'toss-amount--negative' : 'toss-amount--positive'"
         th:text="${#numbers.formatInteger(snapshot.netWorth, 0, 'COMMA')} + '원'">0원</p>
    </section>

    <div class="toss-stats" style="grid-template-columns: 1fr 1fr;">
      <div class="toss-stat">
        <span class="toss-stat-label">자산</span>
        <span class="toss-stat-value toss-stat-value--income"
              th:text="${#numbers.formatInteger(snapshot.assetsTotal, 0, 'COMMA')} + '원'">0원</span>
      </div>
      <div class="toss-stat">
        <span class="toss-stat-label">부채</span>
        <span class="toss-stat-value toss-stat-value--expense"
              th:text="${#numbers.formatInteger(snapshot.liabilitiesTotal, 0, 'COMMA')} + '원'">0원</span>
      </div>
    </div>

    <!-- 12개월 추이 -->
    <div class="toss-card mb-4">
      <p class="toss-page-subtitle mb-2" style="margin-top:0;">최근 12개월</p>
      <canvas id="nwChart" height="200"></canvas>
    </div>

    <!-- 자산 -->
    <h2 class="toss-page-subtitle" style="font-size: 14px; font-weight: 700; color: var(--toss-text-strong); margin: 16px 0 8px;">자산</h2>
    <div th:each="a : ${snapshot.assets}" class="toss-card mb-2" th:id="'asset-' + ${a.id}">
      <form method="post" th:action="@{/web/networth/assets/{id}(id=${a.id})}" class="row g-1">
        <input type="hidden" name="ym" th:value="${month}">
        <div class="col-7"><input name="name" th:value="${a.name}" class="form-control form-control-sm" placeholder="이름" required></div>
        <div class="col-5"><input name="type" th:value="${a.type}" class="form-control form-control-sm" placeholder="종류" required></div>
        <div class="col-9"><input type="number" inputmode="numeric" name="balance" th:value="${a.balance}" min="0" step="1" class="form-control form-control-sm" placeholder="잔액" required></div>
        <div class="col-3 d-grid"><button class="btn toss-pill toss-pill--primary" type="submit">저장</button></div>
      </form>
      <form method="post" th:action="@{/web/networth/assets/{id}/delete(id=${a.id})}" class="mt-1 text-end">
        <input type="hidden" name="ym" th:value="${month}">
        <button class="btn btn-link btn-sm p-0" type="submit"
                style="color: var(--toss-expense); text-decoration: none; font-size: 12px;">삭제</button>
      </form>
    </div>
    <div th:if="${snapshot.assets.isEmpty()}" class="toss-empty" style="padding: 24px;">자산이 없습니다.</div>
    <div class="toss-card mb-4" style="border-style: dashed;">
      <form method="post" th:action="@{/web/networth/assets}" class="row g-1">
        <input type="hidden" name="yearMonth" th:value="${month}">
        <div class="col-7"><input name="name" class="form-control form-control-sm" placeholder="이름" required></div>
        <div class="col-5"><input name="type" class="form-control form-control-sm" placeholder="종류" required></div>
        <div class="col-9"><input type="number" inputmode="numeric" name="balance" min="0" step="1" class="form-control form-control-sm" placeholder="잔액" required></div>
        <div class="col-3 d-grid"><button class="btn toss-pill toss-pill--primary" type="submit">+ 자산</button></div>
      </form>
    </div>

    <!-- 부채 -->
    <h2 class="toss-page-subtitle" style="font-size: 14px; font-weight: 700; color: var(--toss-text-strong); margin: 16px 0 8px;">부채</h2>
    <div th:each="l : ${snapshot.liabilities}" class="toss-card mb-2" th:id="'liability-' + ${l.id}">
      <form method="post" th:action="@{/web/networth/liabilities/{id}(id=${l.id})}" class="row g-1">
        <input type="hidden" name="ym" th:value="${month}">
        <div class="col-7"><input name="name" th:value="${l.name}" class="form-control form-control-sm" placeholder="이름" required></div>
        <div class="col-5"><input name="type" th:value="${l.type}" class="form-control form-control-sm" placeholder="종류" required></div>
        <div class="col-9"><input type="number" inputmode="numeric" name="balance" th:value="${l.balance}" min="0" step="1" class="form-control form-control-sm" placeholder="잔액" required></div>
        <div class="col-3 d-grid"><button class="btn toss-pill toss-pill--primary" type="submit">저장</button></div>
      </form>
      <form method="post" th:action="@{/web/networth/liabilities/{id}/delete(id=${l.id})}" class="mt-1 text-end">
        <input type="hidden" name="ym" th:value="${month}">
        <button class="btn btn-link btn-sm p-0" type="submit"
                style="color: var(--toss-expense); text-decoration: none; font-size: 12px;">삭제</button>
      </form>
    </div>
    <div th:if="${snapshot.liabilities.isEmpty()}" class="toss-empty" style="padding: 24px;">부채가 없습니다.</div>
    <div class="toss-card mb-3" style="border-style: dashed;">
      <form method="post" th:action="@{/web/networth/liabilities}" class="row g-1">
        <input type="hidden" name="yearMonth" th:value="${month}">
        <div class="col-7"><input name="name" class="form-control form-control-sm" placeholder="이름" required></div>
        <div class="col-5"><input name="type" class="form-control form-control-sm" placeholder="종류" required></div>
        <div class="col-9"><input type="number" inputmode="numeric" name="balance" min="0" step="1" class="form-control form-control-sm" placeholder="잔액" required></div>
        <div class="col-3 d-grid"><button class="btn toss-pill toss-pill--primary" type="submit">+ 부채</button></div>
      </form>
    </div>

    <div class="d-grid gap-2">
      <a th:href="@{/web/home}" class="btn toss-cta toss-cta-secondary">홈으로</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
    <script th:inline="javascript">
      /*<![CDATA[*/
      const labels = /*[[${labels}]]*/ [];
      const assetsSeries = /*[[${assetsSeries}]]*/ [];
      const liabilitiesSeries = /*[[${liabilitiesSeries}]]*/ [];
      const netWorthSeries = /*[[${netWorthSeries}]]*/ [];
      // CSS variable (app.css 의 :root / [data-bs-theme="dark"]) 에서 차트 색을 읽음 — 다크모드 자동 대응.
      const css = getComputedStyle(document.documentElement);
      const COLOR_ASSETS = css.getPropertyValue('--account-chart-assets').trim();
      const COLOR_LIABILITIES = css.getPropertyValue('--account-chart-liabilities').trim();
      const COLOR_NETWORTH = css.getPropertyValue('--account-chart-networth').trim();
      new Chart(document.getElementById('nwChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: '자산', data: assetsSeries, borderColor: COLOR_ASSETS, tension: 0.2 },
            { label: '부채', data: liabilitiesSeries, borderColor: COLOR_LIABILITIES, tension: 0.2 },
            { label: '순자산', data: netWorthSeries, borderColor: COLOR_NETWORTH, tension: 0.2 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } },
          scales: { y: { ticks: { callback: function (v) { return (v / 10000) + '만'; } } } }
        }
      });
      /*]]>*/
    </script>

  </th:block>
</th:block>
</body>
</html>
