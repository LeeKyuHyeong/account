<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-bs-theme="light">
<head th:replace="~{fragments/head :: head('가족 만들기')}"></head>
<body class="toss-page-bg">
<main class="container" style="max-width: 420px; padding-top: 72px;">

  <h1 class="toss-page-title text-center mb-1" style="font-size: 26px;">가족 만들기</h1>
  <p class="toss-page-subtitle text-center mb-4">가구 이름을 정해주세요 (나중에 바꿀 수 있어요)</p>

  <div class="toss-card" style="padding: 24px;">
    <form th:action="@{/web/onboarding/create}" method="post">
      <div class="mb-2">
        <label for="name" class="form-label fw-semibold small">가구 이름</label>
        <input type="text" id="name" name="name" class="form-control form-control-lg"
               th:value="${form['name']}"
               placeholder="예: 우리집" required autofocus maxlength="100">
        <div class="text-danger small mt-1"
             th:if="${errors['name']}" th:text="${errors['name']}">오류</div>
      </div>
      <button type="submit" class="btn toss-cta toss-cta-primary w-100 mt-3">만들기</button>
    </form>
  </div>

  <p class="text-center mt-3 mb-0">
    <a th:href="@{/web/onboarding}" class="toss-page-subtitle text-decoration-none">← 뒤로</a>
  </p>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
