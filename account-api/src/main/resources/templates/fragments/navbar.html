<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!--
  하단 탭바 (모바일 웹앱 셸). 이전의 상단 navbar 를 대체한다.
  position:fixed bottom 이라 layout.html 의 include 위치(본문 앞)와 무관하게 항상 화면 하단에 고정.
  active 표시: currentUri (ViewContextAdvice 주입) 가 탭 섹션 prefix 로 시작하면 'active'.
  구독/가구설정/추이/예산/테마/로그아웃 등은 "더보기" 페이지(/web/more)로 모았다.
-->
<nav th:fragment="navbar" class="tabbar" th:with="uri=${currentUri}" sec:authorize="isAuthenticated()">
  <a th:href="@{/web/home}" class="tabbar__item"
     th:classappend="${#strings.startsWith(uri, '/web/home')} ? 'active' : ''">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z"/>
    </svg>
    <span>홈</span>
  </a>
  <a th:href="@{/web/transactions}" class="tabbar__item"
     th:classappend="${#strings.startsWith(uri, '/web/transactions')} ? 'active' : ''">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5M1.5 12a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0-4a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0-4a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
    </svg>
    <span>거래</span>
  </a>
  <a th:href="@{/web/report}" class="tabbar__item"
     th:classappend="${#strings.startsWith(uri, '/web/report')} ? 'active' : ''">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M4 11H2v3h2zm5-4H7v7h2zm5-5v12h-2V2zm-2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM6 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1zm-5 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1z"/>
    </svg>
    <span>결산</span>
  </a>
  <a th:href="@{/web/networth}" class="tabbar__item"
     th:classappend="${#strings.startsWith(uri, '/web/networth')} ? 'active' : ''">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M12.136.326A1.5 1.5 0 0 1 14 1.78V3h.5A1.5 1.5 0 0 1 16 4.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 13.5v-9a1.5 1.5 0 0 1 1.432-1.499zM5.562 3H13V1.78a.5.5 0 0 0-.621-.484zM1.5 4a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5z"/>
    </svg>
    <span>순자산</span>
  </a>
  <a th:href="@{/web/more}" class="tabbar__item"
     th:classappend="${#strings.startsWith(uri, '/web/more')
        or #strings.startsWith(uri, '/web/trend')
        or #strings.startsWith(uri, '/web/budget')
        or #strings.startsWith(uri, '/web/plan')
        or #strings.startsWith(uri, '/web/admin')} ? 'active' : ''">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3M8 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3"/>
    </svg>
    <span>더보기</span>
  </a>
</nav>
</body>
</html>
