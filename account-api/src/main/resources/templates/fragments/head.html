<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title th:text="${title} ?: '가계부'">가계부</title>
  <!--
    FOUC 방지 — stylesheet 보다 먼저 실행되어야 함.
    localStorage 의 사용자 선택을 읽어 <html data-bs-theme> 을 라이트→다크로 즉시 교체.
    Bootstrap 5.3 의 색상 토큰이 처음부터 올바른 값으로 적용된다.
  -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('account-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-bs-theme', t);
        }
      } catch (e) { /* localStorage 차단 환경(시크릿 모드 등): 기본 light 유지 */ }
    })();
  </script>
  <!--
    Pretendard variable (한글 다이내믹 서브셋) — Toss 톤의 큰 숫자/제목이 살아남게 하기 위한 한글 폰트.
    jsdelivr 단일 CDN, 외부 의존이지만 stylesheet 1개라 차단 시에도 system fallback(font-family 의
    Apple SD Gothic Neo / Malgun Gothic) 으로 자연스럽게 떨어진다.
  -->
  <!--
    PWA — "홈 화면에 추가" 시 standalone 앱처럼 동작 (하단탭 셸과 합이 맞음).
    iOS 는 이 설치 경로가 Web Push 수신의 전제 조건이기도 하다.
  -->
  <link rel="manifest" th:href="@{/manifest.webmanifest}">
  <meta name="theme-color" content="#3182F6">
  <!-- favicon — ₩ 픽토그램 (tools/generate-icons.py 와 동일 소스). SVG 우선, 구형 브라우저는 ico 폴백. -->
  <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}">
  <link rel="icon" sizes="48x48 32x32 16x16" th:href="@{/favicon.ico}">
  <link rel="apple-touch-icon" th:href="@{/icons/icon-180.png}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="가계부">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
</html>
