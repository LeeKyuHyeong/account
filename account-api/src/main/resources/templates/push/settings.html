<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{fragments/layout :: page('알림 설정', ~{::content})}">
  <th:block th:fragment="content">

    <div class="mb-3">
      <h1 class="toss-page-title">알림 설정</h1>
      <p class="toss-page-subtitle">이 브라우저로 가계부 알림을 받아요</p>
    </div>

    <!-- 서버에 VAPID 키 미설정 — 기능 자체 비활성 -->
    <div th:unless="${pushEnabled}" class="toss-card">
      <p class="mb-0" style="font-size: 14px; color: var(--toss-text-muted);">
        푸시 알림이 아직 설정되지 않았어요 (서버 VAPID 키 미구성).
      </p>
    </div>

    <th:block th:if="${pushEnabled}">
      <div class="toss-card mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div class="fw-semibold" style="color: var(--toss-text-strong);">이 브라우저 알림</div>
          <span id="push-status" class="toss-badge toss-badge--neutral">확인 중…</span>
        </div>
        <p style="font-size: 12px; color: var(--toss-text-muted);" class="mb-3">
          기기(브라우저)별로 켜고 끕니다. 폰과 PC 에서 각각 켜면 둘 다 받아요.<br>
          iPhone 은 Safari 공유 메뉴의 <b>"홈 화면에 추가"</b> 로 설치한 뒤 그 아이콘으로 열어야 알림을 받을 수 있어요 (iOS 정책).
        </p>
        <div class="d-grid gap-2">
          <button type="button" id="push-enable" class="btn toss-cta toss-cta-primary d-none">알림 켜기</button>
          <button type="button" id="push-disable" class="btn toss-cta toss-cta-secondary d-none">알림 끄기</button>
          <button type="button" id="push-test" class="btn toss-cta toss-cta-secondary d-none">테스트 알림 보내기</button>
          <button type="button" id="push-digest" class="btn toss-cta toss-cta-secondary d-none">오늘 요약 지금 받기</button>
        </div>
      </div>
    </th:block>

    <div class="d-grid">
      <a th:href="@{/web/more}" class="btn toss-cta toss-cta-secondary">더보기로</a>
    </div>

    <!--
      Push API 흐름: SW 등록 → 알림 권한 → pushManager.subscribe(VAPID 공개키)
      → 구독 JSON 을 서버 저장. CSRF 는 fetch 헤더로 동봉 (webChain CSRF 활성).
    -->
    <script th:if="${pushEnabled}" th:inline="javascript">
      (function () {
        var VAPID_PUBLIC_KEY = /*[[${vapidPublicKey}]]*/ '';
        var CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
        var CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';

        var statusEl = document.getElementById('push-status');
        var enableBtn = document.getElementById('push-enable');
        var disableBtn = document.getElementById('push-disable');
        var testBtn = document.getElementById('push-test');
        var digestBtn = document.getElementById('push-digest');

        function setStatus(text, on) {
          statusEl.textContent = text;
          statusEl.className = 'toss-badge ' + (on ? 'toss-badge--success' : 'toss-badge--neutral');
        }
        function show(el, visible) { el.classList.toggle('d-none', !visible); }

        // base64url → Uint8Array (applicationServerKey 형식)
        function urlBase64ToUint8Array(base64) {
          var padding = '='.repeat((4 - base64.length % 4) % 4);
          var raw = atob((base64 + padding).replace(/-/g, '+').replace(/_/g, '/'));
          var arr = new Uint8Array(raw.length);
          for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
          return arr;
        }

        function post(path, body) {
          var headers = { 'Content-Type': 'application/json' };
          headers[CSRF_HEADER] = CSRF_TOKEN;
          return fetch(path, { method: 'POST', headers: headers, body: JSON.stringify(body || {}) });
        }

        async function refresh() {
          if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
            setStatus('이 브라우저는 미지원', false);
            return;
          }
          if (Notification.permission === 'denied') {
            setStatus('권한 거부됨 — 브라우저 설정에서 허용 필요', false);
            return;
          }
          var reg = await navigator.serviceWorker.register('/sw.js');
          var sub = await reg.pushManager.getSubscription();
          setStatus(sub ? '켜짐' : '꺼짐', !!sub);
          show(enableBtn, !sub);
          show(disableBtn, !!sub);
          show(testBtn, !!sub);
          show(digestBtn, !!sub);
        }

        enableBtn.addEventListener('click', async function () {
          try {
            var perm = await Notification.requestPermission();
            if (perm !== 'granted') { refresh(); return; }
            var reg = await navigator.serviceWorker.register('/sw.js');
            var sub = await reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
            });
            await post('/web/push/subscribe', sub.toJSON());
            refresh();
          } catch (e) {
            setStatus('켜기 실패 — ' + e.message, false);
          }
        });

        disableBtn.addEventListener('click', async function () {
          var reg = await navigator.serviceWorker.register('/sw.js');
          var sub = await reg.pushManager.getSubscription();
          if (sub) {
            await post('/web/push/unsubscribe', { endpoint: sub.endpoint });
            await sub.unsubscribe();
          }
          refresh();
        });

        testBtn.addEventListener('click', async function () {
          var res = await post('/web/push/test');
          var data = await res.json();
          testBtn.textContent = data.sent > 0
              ? '발송됨 (' + data.sent + '기기) — 알림을 확인하세요'
              : '발송 실패 — 구독 상태를 확인하세요';
          setTimeout(function () { testBtn.textContent = '테스트 알림 보내기'; }, 3000);
        });

        // 매일 21시 자동 발송되는 일일 요약(오늘 분석/확정 대기)을 즉시 받아보는 검증용
        digestBtn.addEventListener('click', async function () {
          await post('/web/push/digest-now');
          digestBtn.textContent = '요청됨 — 보낼 내용이 있으면 알림이 와요';
          setTimeout(function () { digestBtn.textContent = '오늘 요약 지금 받기'; }, 3000);
        });

        refresh();
      })();
    </script>

  </th:block>
</th:block>
</body>
</html>
