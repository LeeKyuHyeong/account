<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" data-bs-theme="light">
<head th:replace="~{fragments/head :: head('시작하기')}"></head>
<body class="toss-page-bg">
<main class="container d-flex flex-column" style="max-width: 420px; min-height: 100vh; padding: 0 24px;">

  <div class="flex-grow-1 d-flex flex-column justify-content-center text-center">
    <h1 class="toss-amount mb-2" style="font-size: 34px;">가계부</h1>
    <p class="toss-page-subtitle" style="font-size: 15px;">영수증 찍으면 끝나는 우리집 가계부</p>
  </div>

  <div class="pb-5">
    <div th:if="${param.error}" class="toss-alert">
      로그인에 실패했어요. 다시 시도해 주세요.
    </div>
    <div th:if="${param.logout}" class="toss-alert toss-alert--success">
      로그아웃되었습니다.
    </div>

    <a th:href="@{/oauth2/authorization/kakao}" class="btn kakao-cta w-100">
      <span class="kakao-cta__icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 18 18" fill="currentColor">
          <path d="M9 1.5C4.86 1.5 1.5 4.14 1.5 7.4c0 2.1 1.4 3.94 3.5 5l-.9 3.3c-.07.26.22.46.45.31l3.96-2.6c.16.01.32.02.49.02 4.14 0 7.5-2.64 7.5-5.93S13.14 1.5 9 1.5"/>
        </svg>
      </span>
      카카오톡으로 시작하기
    </a>
    <p class="text-center toss-page-subtitle mt-3 mb-0" style="font-size: 12px;">
      처음이면 자동으로 회원가입돼요
    </p>
  </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
