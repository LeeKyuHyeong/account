spring:
  application:
    name: account-api

  # ─── 시크릿 분리 (§10.2 KH Shop 패턴) ───
  # 프로젝트 루트의 application-secret.yml 을 병합 로드 (gitignored).
  # 파일이 없어도 기동에 실패하지 않도록 optional: 접두사 사용.
  # 운영에서는 본 파일 대신 환경변수 (ACCOUNT_CLAUDE_API_KEY 등) 로 주입.
  config:
    import: optional:file:./application-secret.yml

  # Java 21 가상 스레드 — DB / Claude API 동기 호출이 캐리어 스레드를 점유하지 않음
  threads:
    virtual:
      enabled: true

  # ─── DataSource (MariaDB) ───
  # 운영에서는 ACCOUNT_DB_* 환경변수로 반드시 오버라이드. 기본값은 로컬
  # docker-compose 와 맞춰둔 dev 전용 값이며, 시크릿이 아니다.
  datasource:
    # 로컬 docker-compose 가 호스트 3305 로 노출 (기존 mysqld 가 3306 점유).
    # 운영에서는 ACCOUNT_DB_PORT 환경변수로 표준 3306 (또는 사내 포트) 오버라이드.
    url: jdbc:mariadb://${ACCOUNT_DB_HOST:localhost}:${ACCOUNT_DB_PORT:3305}/${ACCOUNT_DB_NAME:account}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    username: ${ACCOUNT_DB_USER:account}
    password: ${ACCOUNT_DB_PASSWORD:accountlocal}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: account-api-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000

  # ─── JPA / Hibernate ───
  # 스키마 관리는 Flyway 단독 책임. JPA 는 entity ↔ schema 정합성 검증만 수행.
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  # ─── Flyway ───
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ─── 멀티파트 업로드 (영수증) ───
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ─── OAuth2 클라이언트 (카카오 단독 인증) ───
  # client-id/secret 은 시크릿 — application-secret.yml 또는 환경변수(KAKAO_CLIENT_ID/SECRET)로 주입.
  # 기본 placeholder 는 ApplicationContext 기동/CI 용 (실제 로그인 시도 시에만 카카오가 거부).
  # redirect-uri 의 {baseUrl} 은 forward-headers-strategy=framework 로 프록시 뒤에서도 https 로 해석된다.
  # 카카오 개발자 콘솔에 등록할 Redirect URI: {origin}/login/oauth2/code/kakao (로컬: http://localhost:8080/...).
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:placeholder-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:placeholder-kakao-client-secret}
            # 카카오 앱이 Client Secret "사용함" 상태 → 토큰 요청에 client_secret 동봉 (미동봉 시 KOE010/401).
            # 앱 > 플랫폼 키 > REST API 키 > 클라이언트 시크릿. 끄려면 거기서 "사용 안 함" + 여기를 none 으로.
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  # 로컬 기본 8085 (운영 호스트 포트와 동일하게 맞춤 — 기존 8080 portfolio 등과 충돌 회피).
  # 운영 컨테이너는 내부적으로 8080 을 들어야 하므로(docker-compose.prod.yml 의 8085:8080 매핑)
  # 거기선 SERVER_PORT=8080 으로 오버라이드한다.
  port: ${SERVER_PORT:8085}
  # 리버스 프록시(nginx) 뒤에서 X-Forwarded-* 를 신뢰 — HTTPS 로 인식해 세션 쿠키 /
  # 로그인 302 리다이렉트가 https 로 생성되도록 한다 (SSR + TLS 종단 nginx 필수).
  forward-headers-strategy: framework

# 영수증 이미지 저장 루트.
#   개발: ./data/receipts (프로젝트 루트 기준, gitignored)
#   운영: ACCOUNT_RECEIPTS_STORAGE_ROOT=/mnt/data/receipts 환경변수로 오버라이드
# 실제 경로 = {root}/{householdId}/{yyyy}/{mm}/{uuid}.{ext}

# 시크릿 placeholder — 실제 운영 값은 환경변수 또는 application-secret.yml 에서 주입.
# 본 placeholder 는 ApplicationContext 기동 검증용. 실제 Claude 호출 시 401 발생.
account:
  claude:
    api-key: ${ACCOUNT_CLAUDE_API_KEY:placeholder-set-via-application-secret-yml}
    # 모델/토큰/타임아웃은 재배포 없이 환경변수로 조정 가능 (기본값은 ClaudeProperties 와 동일).
    model: ${ACCOUNT_CLAUDE_MODEL:claude-sonnet-4-6}
    max-tokens: ${ACCOUNT_CLAUDE_MAX_TOKENS:2048}
    timeout: ${ACCOUNT_CLAUDE_TIMEOUT:30s}
    connect-timeout: ${ACCOUNT_CLAUDE_CONNECT_TIMEOUT:5s}
    max-retries: ${ACCOUNT_CLAUDE_MAX_RETRIES:2}
    retry-backoff: ${ACCOUNT_CLAUDE_RETRY_BACKOFF:1s}
  receipts:
    storage-root: ${ACCOUNT_RECEIPTS_STORAGE_ROOT:./data/receipts}
  kakao:
    # 카카오톡 초대 공유(JS SDK)용 JavaScript 키 — REST API 키와 다른 키.
    # 도메인 제한이 걸리는 공개 키지만 로컬/운영 앱이 달라 env 로 주입. 비어 있으면 공유 버튼 숨김.
    # 카카오 콘솔에서 [플랫폼 > Web] 에 사이트 도메인 등록 필요 (localhost:8085 / 운영 도메인).
    javascript-key: ${KAKAO_JS_KEY:}

logging:
  level:
    com.kyuhyeong: DEBUG
    org.flywaydb: INFO
    # Hibernate SQL 보고 싶으면 DEBUG
    org.hibernate.SQL: INFO
