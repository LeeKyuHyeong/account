# account-app 운영 stack (docs/account.md §5.3).
#
# 사용 흐름 (VPS 에서):
#   1. .env.prod 파일 작성 (시크릿 채움) — .env.prod.example 참고
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod build
#   3. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#   4. 호스트 nginx 가 127.0.0.1:8080 으로 리버스 프록시 (infra/nginx/ 예시 참고)
#
# 차이점 (개발용 docker-compose.yml 대비):
#   - MariaDB 가 호스트에 노출 X (compose 내부 네트워크 전용)
#   - account-api 는 127.0.0.1:8085 에만 바인딩 (외부 직접 접근 차단, nginx 만 진입점)
#   - 영수증 저장은 /var/lib/account-app/receipts 호스트 볼륨
#   - DB 데이터도 /var/lib/account-app/mariadb (개발과 분리)
#   - restart 정책 always (재부팅 후 자동 기동)

services:
  mariadb:
    image: mariadb:11.4
    container_name: account-app-mariadb-prod
    restart: always
    environment:
      TZ: Asia/Seoul  # 컨테이너 시스템 시각(로그 등). 세션 기본존은 아래 --default-time-zone 이 담당
      MARIADB_ROOT_PASSWORD: ${ACCOUNT_DB_ROOT_PASSWORD:?required}
      MARIADB_DATABASE: ${ACCOUNT_DB_NAME:-account}
      MARIADB_USER: ${ACCOUNT_DB_USER:-account}
      MARIADB_PASSWORD: ${ACCOUNT_DB_PASSWORD:?required}
    volumes:
      - /var/lib/account-app/mariadb:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    # 외부 DB 접속용 호스트 노출 (운영 관리/조회). 호스트 3311 → 컨테이너 3306.
    # ⚠ 모든 인터페이스(0.0.0.0)에 열리므로 VPS 방화벽에서 3311 을 관리자 IP 로 제한할 것
    #    (미제한 시 운영 DB 가 인터넷에 직접 노출됨).
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - account-net

  account-api:
    build:
      context: .
      dockerfile: account-api/Dockerfile
    image: account-app/account-api:latest
    container_name: account-app-api-prod
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # JVM 기본존 — 미설정 시 UTC 라 앱 타임스탬프가 DB NOW()(+09:00)와 9시간 엇갈림
      TZ: Asia/Seoul

      # DB — compose 내부 DNS 로 mariadb 서비스명 사용. 호스트 mysqld 와 충돌 없음.
      ACCOUNT_DB_HOST: mariadb
      ACCOUNT_DB_PORT: "3306"
      ACCOUNT_DB_NAME: ${ACCOUNT_DB_NAME:-account}
      ACCOUNT_DB_USER: ${ACCOUNT_DB_USER:-account}
      ACCOUNT_DB_PASSWORD: ${ACCOUNT_DB_PASSWORD:?required}

      # Claude 시크릿
      ACCOUNT_CLAUDE_API_KEY: ${ACCOUNT_CLAUDE_API_KEY:?required}

      # 영수증 저장 경로 — VOLUME 마운트와 일치
      ACCOUNT_RECEIPTS_STORAGE_ROOT: /mnt/data/receipts

      # 컨테이너 내부 포트는 8080 고정 (아래 8085:8080 매핑 전제).
      # application.yml 의 server.port 기본값이 8085(로컬용)라 운영에선 8080 으로 되돌린다.
      SERVER_PORT: "8080"

      # 카카오 OAuth2 (운영 앱 kh_account_app) — .env.prod 에서 주입.
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?required}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?required}
      # 카카오톡 초대 공유용 JavaScript 키 (선택 — 비우면 공유 버튼 숨김)
      KAKAO_JS_KEY: ${KAKAO_JS_KEY:-}

      # Web Push VAPID 키 (선택 — 비우면 푸시 알림 비활성)
      ACCOUNT_PUSH_VAPID_PUBLIC_KEY: ${ACCOUNT_PUSH_VAPID_PUBLIC_KEY:-}
      ACCOUNT_PUSH_VAPID_PRIVATE_KEY: ${ACCOUNT_PUSH_VAPID_PRIVATE_KEY:-}

      # 앱 관리자(/web/sysadmin) 화이트리스트 — 카카오 providerUserId 콤마 구분 (선택 — 비우면 관리자 없음)
      ACCOUNT_ADMIN_KAKAO_IDS: ${ACCOUNT_ADMIN_KAKAO_IDS:-}

      # JVM 옵션 — 컨테이너 메모리의 75% 사용 (기본 50% 보다 ↑)
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    volumes:
      - /var/lib/account-app/receipts:/mnt/data/receipts
    # 외부 직접 접근 차단 — 호스트 nginx 만 127.0.0.1:8085 으로 진입.
    # 호스트 8085 = 기존 8080 portfolio / 8081 shop / 8082 game / 8083 api / 8084 itsm 다음 빈 포트.
    # (컨테이너 내부는 8080 그대로. host:container = 8085:8080)
    ports:
      - "127.0.0.1:8085:8080"
    networks:
      - account-net

networks:
  account-net:
    driver: bridge
